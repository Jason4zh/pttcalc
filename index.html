<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcaea PTT 计算器</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Arcaea PTT 计算器</h1>
        
        <div class="search-filter-container">
            <input type="text" id="searchInput" placeholder="搜索歌曲名/艺术家...">
            <button id="sortButton" title="切换排序">排序：默认</button>
            <button id="exportButton" class="export-btn" title="导出成绩">导出成绩</button>
            <button id="importButton" class="import-btn" title="导入成绩">导入成绩</button>
            <input type="file" id="importFile" accept=".pttdat" style="display:none">
            
            <div class="difficulty-filter">
                <span>筛选难度：</span>
                <input type="radio" name="diffFilter" id="diff0" value="1">
                <label for="diff0">Past</label>
                
                <input type="radio" name="diffFilter" id="diff1" value="0" checked>
                <label for="diff1">Present</label>
                
                <input type="radio" name="diffFilter" id="diff2" value="2">
                <label for="diff2">Future</label>
                
                <input type="radio" name="diffFilter" id="diff3" value="3">
                <label for="diff3">Beyond</label>
                
                <input type="radio" name="diffFilter" id="diff4" value="4">
                <label for="diff4">Eternal</label>
            </div>
        </div>

        <div class="song-table-wrapper">
            <div class="song-table">
                <div class="song-row header-row">
                    <div class="col title">歌曲名</div>
                    <div class="col artist">艺术家</div>
                    <div class="col bpm">BPM</div>
                    <div class="col diff-info">难度/定数</div>
                    <div class="col score-ptt">分数/PTT/等级</div>
                </div>
                
                <div id="songList" class="song-list"></div>
            </div>
        </div>

        <div class="total-ptt-container">
            <div class="total-ptt-card">
                <div class="total-ptt-title">总 Potential (PTT)</div>
                <div class="total-ptt-value" id="totalPtt">0.00</div>
                <div class="total-ptt-subtitle">基于您的最佳成绩计算</div>
            </div>
        </div>
    </div>

    <script>
        let allSongs = [];
        const STORAGE_KEY = 'arcaeaScores';
        let scoreRecords = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
        const ratingClassMap = ['Present', 'Past', 'Future', 'Beyond', 'Eternal'];
        let currentFilterDiff = 0;
        const gradeMap = {};
        const gradeFields = ['PRS','PST','FTR','BYD','ETR'];

        fetch('songlist6_11_8f.json')
            .then(response => response.text())
            .then(data => {
                const songData = JSON.parse(data);
                allSongs = songData.songs.filter(song => !song.deleted);
                
                const diffFilterRadios = document.querySelectorAll('input[name="diffFilter"]');
                diffFilterRadios.forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        currentFilterDiff = parseInt(e.target.value);
                        renderSongList();
                    });
                });

                const searchInput = document.getElementById('searchInput');
                searchInput.addEventListener('input', () => {
                    renderSongList();
                });

                renderSongList();
                calculateTotalPTT();
            })
            .catch(error => console.error('加载曲目数据失败:', error));
            
        fetch('grade6_11_8f.json')
            .then(response => response.text())
            .then(data => {
                try {
                    const gradeData = JSON.parse(data);
                    gradeData.forEach(item => {
                        if (item && item.Name) {
                            const key = String(item.Name).replace(/\s+/g, '').toLowerCase();
                            gradeMap[key] = item;
                        }
                    });
                } catch (e) {
                    console.error('解析等级数据失败:', e);
                }
            })
            .catch(error => console.error('加载等级数据失败:', error));
        
        function renderSongList() {
            const songListEl = document.getElementById('songList');
            const searchKeyword = document.getElementById('searchInput').value.trim().toLowerCase();
            songListEl.innerHTML = '';
            const filteredSongs = allSongs.filter(song => {
                const targetDiff = Array.isArray(song.difficulties) ? song.difficulties.find(diff => diff.ratingClass === currentFilterDiff) : null;
                const hasTargetDiff = !!targetDiff;

                // 构建用于搜索的字符串：优先使用谱面级别覆盖的标题/其它语言的 search_title
                const searchParts = [];

                if (song.search_title && typeof song.search_title === 'object') {
                    Object.keys(song.search_title).forEach(lang => {
                        const v = song.search_title[lang];
                        if (Array.isArray(v)) searchParts.push(...v);
                        else if (typeof v === 'string') searchParts.push(v);
                    });
                }

                // 谱面级别的标题覆盖也应参与搜索
                if (targetDiff && targetDiff.title_localized && targetDiff.title_localized.en) searchParts.push(targetDiff.title_localized.en);

                if (song.title_localized && song.title_localized.en) searchParts.push(song.title_localized.en);
                if (song.title) searchParts.push(song.title);
                if (song.artist) searchParts.push(song.artist);

                const searchTitle = searchParts.join(' ').toLowerCase();
                const titleMatch = searchTitle.includes(searchKeyword);
                const artistMatch = (song.artist || '').toLowerCase().includes(searchKeyword) || (targetDiff && (targetDiff.artist || '').toLowerCase().includes(searchKeyword));

                return hasTargetDiff && (titleMatch || artistMatch);
            });

            // 将要渲染的条目映射为包含用于排序的字段的对象
            const mapped = filteredSongs.map(song => {
                const targetDiff = Array.isArray(song.difficulties) ? song.difficulties.find(diff => diff.ratingClass === currentFilterDiff) : null;
                const displayTitle = (targetDiff && targetDiff.title_localized && targetDiff.title_localized.en) || (song.title_localized && song.title_localized.en) || song.title || '';
                const artistDisplay = (targetDiff && targetDiff.artist) || song.artist || '';
                const nameKey = displayTitle.replace(/\s+/g, '').toLowerCase();
                const gradeEntry = gradeMap[nameKey];
                let constantValue = targetDiff ? targetDiff.rating : 0;
                if (gradeEntry) {
                    const field = gradeFields[currentFilterDiff];
                    const v = parseFloat(gradeEntry[field]);
                    if (!isNaN(v)) constantValue = v;
                }
                const parsedConstant = parseFloat(constantValue);
                const constantForCalc = !isNaN(parsedConstant) ? parsedConstant : (targetDiff ? (parseFloat(targetDiff.rating) || 0) : 0);
                const recordKey = `${song.id}_${currentFilterDiff}`;
                const rec = scoreRecords[recordKey] || null;
                const score = rec ? rec.score : 0;
                const ptt = rec ? rec.ptt : null;
                return { song, targetDiff, displayTitle, artistDisplay, constantForCalc, recordKey, score, ptt };
            });

            // 根据当前排序模式对 mapped 进行排序
            if (currentSortIndex && mapped.length > 1) {
                const mode = sortModes[currentSortIndex];
                switch (mode) {
                    case 'title-asc':
                        mapped.sort((a,b) => a.displayTitle.localeCompare(b.displayTitle, undefined, {sensitivity:'base'}));
                        break;
                    case 'title-desc':
                        mapped.sort((a,b) => b.displayTitle.localeCompare(a.displayTitle, undefined, {sensitivity:'base'}));
                        break;
                    case 'diff-asc':
                        mapped.sort((a,b) => a.constantForCalc - b.constantForCalc);
                        break;
                    case 'diff-desc':
                        mapped.sort((a,b) => b.constantForCalc - a.constantForCalc);
                        break;
                    case 'score-asc': {
                        const part = mapped.filter(m=>m.score>0).sort((a,b)=>a.score-b.score);
                        const rest = mapped.filter(m=>m.score<=0);
                        mapped.splice(0, mapped.length, ...part, ...rest);
                        break;
                    }
                    case 'score-desc': {
                        const part = mapped.filter(m=>m.score>0).sort((a,b)=>b.score-a.score);
                        const rest = mapped.filter(m=>m.score<=0);
                        mapped.splice(0, mapped.length, ...part, ...rest);
                        break;
                    }
                    case 'ptt-asc': {
                        const part = mapped.filter(m=>m.ptt !== null).sort((a,b)=>a.ptt - b.ptt);
                        const rest = mapped.filter(m=>m.ptt === null);
                        mapped.splice(0, mapped.length, ...part, ...rest);
                        break;
                    }
                    case 'ptt-desc': {
                        const part = mapped.filter(m=>m.ptt !== null).sort((a,b)=>b.ptt - a.ptt);
                        const rest = mapped.filter(m=>m.ptt === null);
                        mapped.splice(0, mapped.length, ...part, ...rest);
                        break;
                    }
                    default:
                        // default: 保持 filteredSongs 的原始顺序（mapped 已按 filteredSongs 映射）
                        break;
                }
            }

            if (filteredSongs.length === 0) {
                songListEl.innerHTML = '<div class="no-result">未找到匹配的歌曲</div>';
                return;
            }

            mapped.forEach(item => {
                const song = item.song;
                const targetDiff = item.targetDiff;
                const displayTitle = item.displayTitle;
                const artistDisplay = item.artistDisplay;
                const constantForCalc = item.constantForCalc;
                const constantDisplay = Number.isFinite(constantForCalc) ? constantForCalc.toFixed(1) : String(constantForCalc);
                const recordKey = item.recordKey;

                const songRow = document.createElement('div');
                songRow.className = 'song-row';

                songRow.innerHTML = `
                    <div class="col title">${displayTitle || '未知歌曲'}</div>
                    <div class="col artist">${artistDisplay || '未知艺术家'}</div>
                    <div class="col bpm">${song.bpm || song.bpm_base || '-'}</div>
                    <div class="col diff-info">
                        <span class="diff-name">${ratingClassMap[currentFilterDiff]}</span>
                        <div class="constant-container">
                            <span class="constant-label">定数</span>
                            <span class="constant-value">${constantDisplay}</span>
                        </div>
                    </div>
                    <div class="col score-ptt">
                        <input type="number" class="score-input" placeholder="输入分数" min="0" max="10000000" data-key="${recordKey}">
                        <div class="result">
                            <div class="ptt-container">
                                <span class="ptt-label">PTT</span>
                                <span class="ptt-value" data-constant="${constantDisplay}">${constantDisplay}</span>
                            </div>
                            <div class="rank-container">
                                <span class="rank-label">等级</span>
                                <span class="rank-badge no-score">-</span>
                            </div>
                        </div>
                    </div>
                `;

                const scoreInput = songRow.querySelector('.score-input');
                const rankEl = songRow.querySelector('.rank-badge');
                const pttEl = songRow.querySelector('.ptt-value');

                if (scoreRecords[recordKey]) {
                    scoreInput.value = scoreRecords[recordKey].score;
                    rankEl.textContent = scoreRecords[recordKey].rank;
                    rankEl.className = `rank-badge ${getRankClass(scoreRecords[recordKey].rank)}`;
                    rankEl.classList.remove('no-score');
                    pttEl.textContent = Math.floor(scoreRecords[recordKey].ptt * 10000) / 10000;
                    pttEl.classList.add('has-score');
                } else {
                    rankEl.textContent = '-';
                    rankEl.className = 'rank-badge no-score';
                    pttEl.textContent = constantDisplay;
                    pttEl.classList.remove('has-score');
                }

                scoreInput.addEventListener('input', () => {
                    const score = parseInt(scoreInput.value) || 0;
                    const key = scoreInput.dataset.key;
                    
                    if (score > 0) {
                        const { rank, ptt } = calculatePTT(score, constantForCalc);
                        
                        rankEl.textContent = rank;
                        rankEl.className = `rank-badge ${getRankClass(rank)}`;
                        rankEl.classList.remove('no-score');
                        pttEl.textContent = Math.floor(ptt * 10000) / 10000;
                        pttEl.classList.add('has-score');
                        
                        scoreRecords[key] = { score, rank, ptt };
                    } else {
                        rankEl.textContent = '-';
                        rankEl.className = 'rank-badge no-score';
                        pttEl.textContent = constantDisplay;
                        pttEl.classList.remove('has-score');
                        
                        delete scoreRecords[key];
                    }
                    
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(scoreRecords));
                    calculateTotalPTT();
                });

                songListEl.appendChild(songRow);
            });
        }

        function calculatePTT(score, constant) {
            let rank = '无';
            let ptt = 0;

            if (score >= 10000000) {
                rank = 'EX+';
                ptt = constant + 2;
            } else if (score >= 9900000) {
                rank = 'EX+';
                ptt = constant + 1 + (score - 9800000) / 200000;
            } else if (score >= 9800000) {
                rank = 'EX';
                ptt = constant + 1 + (score - 9800000) / 200000;
            } else if (score >= 9500000) {
                rank = 'AA';
                ptt = constant + (score - 9500000) / 300000;
            } else if (score >= 9200000) {
                rank = 'A';
                ptt = constant + (score - 9500000) / 300000;
            } else if (score >= 8900000) {
                rank = 'B';
                ptt = constant + (score - 9500000) / 300000;
            } else if (score >= 8600000) {
                rank = 'C';
                ptt = constant + (score - 9500000) / 300000;
            } else if (score > 0) {
                rank = 'D';
                ptt = constant + (score - 9500000) / 300000;
            }

            ptt = Math.max(0, ptt);
            return { rank, ptt };
        }

        function getRankClass(rank) {
            if (rank.includes('EX+')) return 'ex-plus';
            if (rank.includes('EX')) return 'ex';
            if (rank.includes('AA')) return 'aa';
            if (rank.includes('A')) return 'a';
            if (rank.includes('B')) return 'b';
            if (rank.includes('C')) return 'c';
            if (rank.includes('D')) return 'd';
            return '';
        }

        function calculateTotalPTT() {
            const allPtts = Object.values(scoreRecords)
                .map(item => item.ptt)
                .filter(ptt => ptt > 0)
                .sort((a, b) => b - a);

            const b30 = allPtts.slice(0, 30).reduce((sum, ptt) => sum + ptt, 0);
            const b10 = allPtts.slice(0, 10).reduce((sum, ptt) => sum + ptt, 0);
            const totalPtt = (b30 + b10) / 40;

            document.getElementById('totalPtt').textContent = Math.floor(totalPtt * 10000) / 10000;
        }

        // 排序模式与控制
        const sortModes = [
            'default',
            'title-asc',
            'title-desc',
            'diff-asc',
            'diff-desc',
            'score-asc',
            'score-desc',
            'ptt-asc',
            'ptt-desc'
        ];
        let currentSortIndex = 0;

        const sortButton = document.getElementById('sortButton');
        if (sortButton) {
            const labels = {
                'default': '排序：默认',
                'title-asc': '排序：标题 ↑',
                'title-desc': '排序：标题 ↓',
                'diff-asc': '排序：难度 ↑',
                'diff-desc': '排序：难度 ↓',
                'score-asc': '排序：成绩 ↑',
                'score-desc': '排序：成绩 ↓',
                'ptt-asc': '排序：PTT ↑',
                'ptt-desc': '排序：PTT ↓'
            };
            sortButton.addEventListener('click', () => {
                currentSortIndex = (currentSortIndex + 1) % sortModes.length;
                sortButton.textContent = labels[sortModes[currentSortIndex]] || '排序';
                renderSongList();
            });
        }

        // 导出 / 导入 功能
        const exportButton = document.getElementById('exportButton');
        const importButton = document.getElementById('importButton');
        const importFile = document.getElementById('importFile');

        if (exportButton) {
            exportButton.addEventListener('click', () => {
                try {
                    const payload = {
                        exportedAt: new Date().toISOString(),
                        scores: scoreRecords
                    };
                    const json = JSON.stringify(payload, null, 2);
                    const blob = new Blob([json], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    const timestamp = new Date().toISOString().replace(/[:]/g, '-').replace(/T/, '_').split('.')[0];
                    a.download = `pttcalcData${timestamp}.pttdat`;
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                    URL.revokeObjectURL(url);
                } catch (e) {
                    alert('导出失败：' + e.message);
                }
            });
        }

        if (importButton && importFile) {
            importButton.addEventListener('click', () => importFile.click());

            importFile.addEventListener('change', (e) => {
                const file = importFile.files && importFile.files[0];
                if (!file) return;
                if (!file.name.toLowerCase().endsWith('.pttdat')) {
                    alert('仅支持 .pttdat 格式的文件');
                    importFile.value = '';
                    return;
                }
                const reader = new FileReader();
                reader.onload = () => {
                    try {
                        const text = String(reader.result || '');
                        const obj = JSON.parse(text);
                        if (!obj || typeof obj !== 'object' || !obj.scores || typeof obj.scores !== 'object') {
                            throw new Error('文件格式不正确：必须为 .pttdat 且包含 scores 字段');
                        }

                        const incoming = obj.scores;
                        // 合并导入数据（以导入的数据覆盖本地同键条目）
                        scoreRecords = Object.assign({}, scoreRecords, incoming);
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(scoreRecords));
                        renderSongList();
                        calculateTotalPTT();
                        alert('导入成功，已更新成绩记录');
                    } catch (err) {
                        alert('导入失败：' + err.message);
                    } finally {
                        importFile.value = '';
                    }
                };
                reader.onerror = () => {
                    alert('读取文件失败');
                    importFile.value = '';
                };
                reader.readAsText(file, 'utf-8');
            });
        }
    </script>
</body>

</html>
